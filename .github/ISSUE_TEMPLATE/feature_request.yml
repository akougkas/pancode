name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We welcome feature ideas. PanCode is in active development.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: "What problem does this solve?"
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: "How should this work?"
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Dispatch
        - Agents
        - Providers
        - Safety
        - TUI/Dashboard
        - Configuration
        - Observability
        - Runtime Adapters
        - Documentation
        - Other
